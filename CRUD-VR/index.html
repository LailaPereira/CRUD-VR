<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CRUD VR - AFRAME</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <style>
    /* ensure scene doesn't eat pointer events over buttons */
    a-scene {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    button {
      position: relative;
      z-index: 1000;
    }
  </style>
</head>
<body>

  <h2>CRUD VR - AFRAME</h2>

  <button id="btnCreate">Criar Cubo</button>
  <button id="btnUpdate">Mudar Cor</button>
  <button id="btnDelete">Deletar Último</button>

  <a-scene>
    <a-camera position="0 1.6 5"></a-camera>
    <a-light type="ambient" color="#ffffff"></a-light>
    <a-plane rotation="-90 0 0" width="10" height="10" color="#7BC8A4"></a-plane>
  </a-scene>

  <script src="script.js"></script>

</body>
</html>
